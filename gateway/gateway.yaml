apiVersion: gateway.networking.k8s.io/v1
kind: Gateway 
metadata:
  name: kgateway
  namespace: gateway-system
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    - name: http
      protocol: HTTP
      port: 81
      allowedRoutes:
        namespaces:
          from: All